<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Station · Threlkeld</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.4/mqtt.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --forest-deep: #0d1a0d;
      --forest-dark: #1a2e1a;
      --forest-mid: #243022;
      --forest-light: #3b6d11;
      --sage: #7ab87a;
      --sage-light: #a8d4a8;
      --cream: #e8f0e4;
      --cream-dim: #b8c8b4;
      --divider: rgba(122, 184, 122, 0.15);
      --blue: #4a90a4;
      --gold: #c8a84b;
      --red: #c85a4a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--forest-deep);
      color: var(--cream);
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        radial-gradient(ellipse at 20% 50%, rgba(59, 109, 17, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(122, 184, 122, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 16px 0;
      border-bottom: 1px solid var(--divider);
      margin-bottom: 28px;
    }

    .nav-home {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--sage);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-home:hover { color: var(--cream); }
    .nav-divider { color: var(--divider); font-size: 12px; }

    .nav-links {
      display: flex;
      gap: 20px;
      margin-left: auto;
    }

    .nav-link {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--cream-dim);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-link:hover { color: var(--cream); }
    .nav-link.active { color: var(--sage); }

    header {
      padding: 20px 0 28px;
      border-bottom: 1px solid var(--divider);
      margin-bottom: 28px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 16px;
    }

    .header-eyebrow {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--sage);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-eyebrow::before {
      content: '';
      display: inline-block;
      width: 20px;
      height: 1px;
      background: var(--sage);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 400;
      color: var(--cream);
    }

    h1 em { font-style: italic; color: var(--sage-light); }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .status-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--cream-dim);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #666;
    }

    .dot.connected {
      background: var(--sage);
      box-shadow: 0 0 6px var(--sage);
      animation: pulse 2s infinite;
    }

    .dot.error { background: #e05555; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .last-update { font-size: 11px; color: var(--cream-dim); }

    /* Current conditions */
    .conditions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .condition-panel {
      background: var(--forest-dark);
      border: 1px solid var(--divider);
      border-radius: 8px;
      overflow: hidden;
    }

    .panel-header {
      background: var(--forest-mid);
      padding: 10px 16px;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--sage);
    }

    .panel-body { padding: 12px 16px; }

    .condition-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--divider);
    }

    .condition-row:last-child { border-bottom: none; }

    .condition-label { font-size: 12px; color: var(--cream-dim); }
    .condition-value { font-size: 14px; color: var(--cream); font-weight: 500; }
    .condition-value.highlight { color: var(--sage); }
    .condition-value.warning { color: var(--gold); }

    .temp-display {
      text-align: center;
      padding: 16px 0 8px;
    }

    .temp-main {
      font-family: 'Playfair Display', serif;
      font-size: 56px;
      font-weight: 400;
      color: var(--cream);
      line-height: 1;
    }

    .temp-unit { font-size: 24px; color: var(--cream-dim); }
    .temp-feels { font-size: 13px; color: var(--cream-dim); margin-top: 4px; }

    .wind-compass {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 8px 0;
    }

    .compass-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 1px solid var(--divider);
      position: relative;
      background: var(--forest-mid);
    }

    .compass-arrow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 2px;
      height: 32px;
      background: var(--sage);
      transform-origin: bottom center;
      transform: translateX(-50%) translateY(-100%);
      border-radius: 2px 2px 0 0;
    }

    .compass-n { position: absolute; top: 4px; left: 50%; transform: translateX(-50%); font-size: 9px; color: var(--cream-dim); }
    .compass-s { position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); font-size: 9px; color: var(--cream-dim); }
    .compass-e { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); font-size: 9px; color: var(--cream-dim); }
    .compass-w { position: absolute; left: 4px; top: 50%; transform: translateY(-50%); font-size: 9px; color: var(--cream-dim); }

    .wind-info { text-align: center; }

    .wind-speed-big {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      color: var(--cream);
      line-height: 1;
    }

    .wind-label { font-size: 11px; color: var(--cream-dim); }

    /* Records section */
    .records-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .record-card { background: var(--forest-dark); border: 1px solid var(--divider); border-radius: 8px; padding: 14px; }
    .record-icon { font-size: 20px; margin-bottom: 6px; }
    .record-value { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--cream); line-height: 1; margin-bottom: 2px; }
    .record-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sage); }
    .record-date { font-size: 11px; color: var(--cream-dim); margin-top: 4px; }

    /* Stargazing */
    .stargazing-card { background: var(--forest-dark); border: 1px solid var(--divider); border-radius: 10px; padding: 20px; margin-bottom: 28px; display: grid; grid-template-columns: auto 1fr; gap: 20px; align-items: center; }
    @media (max-width: 600px) { .stargazing-card { grid-template-columns: 1fr; } }
    .stargazing-rating { text-align: center; }
    .stargazing-score { font-family: 'Playfair Display', serif; font-size: 56px; color: var(--cream); line-height: 1; }
    .stargazing-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }
    .stargazing-label.excellent { color: #a8d4ff; }
    .stargazing-label.good { color: var(--sage); }
    .stargazing-label.fair { color: var(--warning); }
    .stargazing-label.poor { color: var(--cream-dim); }
    .stargazing-factors { display: flex; flex-direction: column; gap: 8px; }
    .stargazing-factor { display: flex; justify-content: space-between; font-size: 13px; }
    .stargazing-factor-label { color: var(--cream-dim); }
    .stargazing-factor-value { color: var(--cream); }

    /* Wind rose */
    .wind-rose-wrap { background: var(--forest-dark); border: 1px solid var(--divider); border-radius: 10px; padding: 20px; margin-bottom: 28px; display: flex; align-items: center; justify-content: center; gap: 32px; flex-wrap: wrap; }
    .wind-rose-canvas { flex-shrink: 0; }

    /* Correlation */
    .correlation-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .correlation-card { background: var(--forest-dark); border: 1px solid var(--divider); border-radius: 8px; padding: 16px; }
    .correlation-title { font-size: 13px; color: var(--cream); margin-bottom: 4px; }
    .correlation-stat { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--cream); margin: 8px 0 2px; }
    .correlation-desc { font-size: 12px; color: var(--cream-dim); line-height: 1.6; }

    /* Charts section */
    .charts-section { margin-bottom: 40px; }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 16px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--cream);
    }

    .section-sub { font-size: 11px; color: var(--sage); }

    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 900px) {
      .charts-grid { grid-template-columns: 1fr; }
      .conditions-grid { grid-template-columns: 1fr; }
    }

    .chart-panel {
      background: var(--forest-dark);
      border: 1px solid var(--divider);
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      position: relative;
    }

    .chart-panel:hover {
      border-color: rgba(122, 184, 122, 0.35);
      transform: translateY(-1px);
    }

    .chart-panel:hover .expand-hint { opacity: 1; }

    .chart-title {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--sage);
      margin-bottom: 4px;
    }

    .chart-subtitle {
      font-size: 10px;
      color: var(--cream-dim);
      margin-bottom: 10px;
    }

    .expand-hint {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 10px;
      color: var(--sage);
      opacity: 0;
      transition: opacity 0.2s;
      letter-spacing: 0.05em;
    }

    .chart-wrapper { position: relative; height: 160px; }
    .chart-wrapper.tall { height: 200px; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(5, 10, 5, 0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--forest-dark);
      border: 1px solid var(--divider);
      border-radius: 12px;
      width: 100%;
      max-width: 1100px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 28px;
      position: relative;
      animation: modalIn 0.2s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.97); }
      to { opacity: 1; transform: scale(1); }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
      gap: 16px;
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--cream);
    }

    .modal-close {
      background: var(--forest-mid);
      border: 1px solid var(--divider);
      border-radius: 6px;
      color: var(--cream-dim);
      font-size: 18px;
      cursor: pointer;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }

    .modal-close:hover { background: var(--forest-light); color: var(--cream); }

    /* Range selector */
    .range-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .range-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--sage);
      margin-right: 4px;
    }

    .range-btn {
      background: var(--forest-mid);
      border: 1px solid var(--divider);
      border-radius: 20px;
      color: var(--cream-dim);
      font-size: 12px;
      padding: 5px 14px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Source Sans 3', sans-serif;
    }

    .range-btn:hover { border-color: var(--sage); color: var(--cream); }
    .range-btn.active { background: var(--forest-light); border-color: var(--sage); color: var(--cream); }

    .custom-range {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    .date-input {
      background: var(--forest-mid);
      border: 1px solid var(--divider);
      border-radius: 6px;
      color: var(--cream);
      font-size: 12px;
      padding: 5px 10px;
      font-family: 'Source Sans 3', sans-serif;
      outline: none;
      cursor: pointer;
    }

    .date-input:focus { border-color: rgba(122, 184, 122, 0.4); }

    .date-sep { font-size: 11px; color: var(--cream-dim); }

    .apply-btn {
      background: var(--forest-light);
      border: none;
      border-radius: 6px;
      color: var(--cream);
      font-size: 12px;
      padding: 5px 14px;
      cursor: pointer;
      font-family: 'Source Sans 3', sans-serif;
      transition: background 0.15s;
    }

    .apply-btn:hover { background: var(--sage); color: var(--forest-deep); }

    .modal-chart-wrapper { position: relative; height: 400px; }

    /* Footer */
    footer {
      border-top: 1px solid var(--divider);
      padding: 20px 0 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-text { font-size: 11px; color: var(--cream-dim); }
    .footer-brand { font-size: 11px; color: var(--sage); letter-spacing: 0.1em; }

    .loading-overlay {
      text-align: center;
      padding: 60px 20px;
      color: var(--cream-dim);
      font-style: italic;
    }

    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--divider);
      border-top-color: var(--sage);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--forest-deep); }
    ::-webkit-scrollbar-thumb { background: var(--forest-light); border-radius: 3px; }
  </style>

  <script>
    const MQTT_HOST = 'broker.hivemq.com';
    const MQTT_PORT = 8884;
    const CURRENT_TOPIC = 'birdnetpi/greg2026/weather/current';
    const HISTORY_TOPIC = 'birdnetpi/greg2026/weather/history';

    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

    let currentData = null;
    let historyData = null;
    let miniCharts = {};
    let modalChart = null;
    let activeChartConfig = null;
    let activeDays = 30;

    function windDirection(degrees) {
      if (degrees === null || degrees === undefined) return 'N/A';
      const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
      return dirs[Math.round(degrees / 22.5) % 16];
    }

    function fmt(val, decimals=1) {
      if (val === null || val === undefined || val === 'unavailable') return 'N/A';
      const n = parseFloat(val);
      if (isNaN(n)) return val;
      return n.toFixed(decimals);
    }

    function fmtDate(val) {
      if (!val) return 'N/A';
      try {
        return new Date(val).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
      } catch(e) { return 'N/A'; }
    }

    function calcDailyDiff(arr) {
      // For cumulative sensors like rain, calculate daily difference from sum
      return arr.map((d, i) => {
        if (i === 0) return { ...d, _daily: 0 };
        const prev = arr[i - 1];
        const diff = (d.sum || 0) - (prev.sum || 0);
        // If diff is negative (yearly reset on Jan 1) use today's sum value
        return { ...d, _daily: Math.max(0, diff < 0 ? (d.sum || 0) : diff) };
      });
    }

    function filterByDays(arr, days, diff = false) {
      if (!arr || arr.length === 0) return [];
      const data = diff ? calcDailyDiff(arr) : arr;
      if (days === 0) return data;
      const cutoff = Date.now() - days * 24 * 60 * 60 * 1000;
      return data.filter(d => d.t > cutoff);
    }

    function filterByDateRange(arr, from, to, diff = false) {
      if (!arr) return [];
      const data = diff ? calcDailyDiff(arr) : arr;
      const fromTs = new Date(from).getTime();
      const toTs = new Date(to).getTime() + 86400000;
      return data.filter(d => d.t >= fromTs && d.t <= toTs);
    }

    function getLabels(data) {
      return data.map(d => new Date(d.t).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: '2-digit' }));
    }

    Chart.defaults.color = '#b8c8b4';
    Chart.defaults.borderColor = 'rgba(122, 184, 122, 0.08)';
    Chart.defaults.font.family = "'Source Sans 3', sans-serif";
    Chart.defaults.font.size = 10;

    const chartConfigs = [
      {
        id: 'chartTemp',
        title: '🌡️ Temperature',
        subtitle: 'Daily Min / Mean / Max · °C',
        modalTitle: '🌡️ Temperature — Daily Min / Mean / Max (°C)',
        key: 'outdoor_temperature',

    function makeChart(canvasId, type, labels, datasets, options = {}, destroy = true) {
      if (destroy && miniCharts[canvasId]) { miniCharts[canvasId].destroy(); delete miniCharts[canvasId]; }
      const ctx = document.getElementById(canvasId);
      if (!ctx) return null;
      const chart = new Chart(ctx, {
        type,
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: datasets.length > 1, labels: { boxWidth: 8, padding: 6, font: { size: 9 } } } },
          scales: {
            x: { ticks: { maxTicksLimit: 8, maxRotation: 0 }, grid: { color: 'rgba(122,184,122,0.04)' } },
            y: { grid: { color: 'rgba(122,184,122,0.04)' }, ...(options.yScale || {}) }
          },
          elements: { point: { radius: 0 }, line: { tension: 0.3 } },
        }
      });
      if (!destroy) return chart;
      miniCharts[canvasId] = chart;
      return chart;
    }

    function renderMiniCharts() {
      chartConfigs.forEach(cfg => {
        const raw = historyData[cfg.key];
        if (!raw) return;

        if (cfg.isTable) {
          // Lightning: show summary stats in the panel
          const data30 = filterByDays(raw, 30);
          const totalStrikes = data30.reduce((sum, d) => sum + (d.max || 0), 0);
          const strikeDays = data30.filter(d => (d.max || 0) > 0);
          const el = document.getElementById(cfg.id);
          if (el) {
            const wrapper = el.closest('.chart-wrapper');

    function renderRecords(history) {
      if (!history || history.length === 0) return;
      const temps = history.map(d => ({ max: d.outdoor_temperature?.max, min: d.outdoor_temperature?.min, date: d.date })).filter(d => d.max != null);
      const winds = history.map(d => ({ max: d.wind_gust?.max, date: d.date })).filter(d => d.max != null);
      const rain = history.map(d => ({ sum: d.rain?.sum, date: d.date })).filter(d => d.sum != null);
      const pressure = history.map(d => ({ max: d.pressure?.max, min: d.pressure?.min, date: d.date })).filter(d => d.max != null);

      const hottest = temps.reduce((a, b) => b.max > a.max ? b : a, temps[0]);
      const coldest = temps.reduce((a, b) => b.min < a.min ? b : a, temps[0]);
      const windiest = winds.reduce((a, b) => b.max > a.max ? b : a, winds[0]);
      const wettest = rain.reduce((a, b) => b.sum > a.sum ? b : a, rain[0]);
      const highestP = pressure.reduce((a, b) => b.max > a.max ? b : a, pressure[0]);
      const lowestP = pressure.reduce((a, b) => b.min < a.min ? b : a, pressure[0]);

      const fmt = (v, dp=1) => v != null ? Number(v).toFixed(dp) : '—';
      const fmtDate = d => d ? new Date(d).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }) : '';

      document.getElementById('recordsGrid').innerHTML = `
        <div class="record-card"><div class="record-icon">🌡️</div><div class="record-value">${fmt(hottest?.max)}°C</div><div class="record-label">Hottest Day</div><div class="record-date">${fmtDate(hottest?.date)}</div></div>
        <div class="record-card"><div class="record-icon">🥶</div><div class="record-value">${fmt(coldest?.min)}°C</div><div class="record-label">Coldest Night</div><div class="record-date">${fmtDate(coldest?.date)}</div></div>
        <div class="record-card"><div class="record-icon">💨</div><div class="record-value">${fmt(windiest?.max)} mph</div><div class="record-label">Strongest Gust</div><div class="record-date">${fmtDate(windiest?.date)}</div></div>
        <div class="record-card"><div class="record-icon">🌧️</div><div class="record-value">${fmt(wettest?.sum)} mm</div><div class="record-label">Wettest Day</div><div class="record-date">${fmtDate(wettest?.date)}</div></div>
        <div class="record-card"><div class="record-icon">⬆️</div><div class="record-value">${fmt(highestP?.max)} hPa</div><div class="record-label">Highest Pressure</div><div class="record-date">${fmtDate(highestP?.date)}</div></div>
        <div class="record-card"><div class="record-icon">⬇️</div><div class="record-value">${fmt(lowestP?.min)} hPa</div><div class="record-label">Lowest Pressure</div><div class="record-date">${fmtDate(lowestP?.date)}</div></div>`;
    }

    // ── Stargazing ────────────────────────────────────────────
    async function renderStargazing(current) {
      try {
        const lat = 54.616, lon = -3.056;
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=cloudcover,visibility&daily=sunrise,sunset&timezone=Europe%2FLondon&forecast_days=1`);
        const data = await res.json();

        // Get night hours (after sunset, before sunrise)
        const sunset = new Date(data.daily.sunset[0]);
        const now = new Date();
        const nightHour = Math.max(sunset.getHours(), now.getHours());
        const idx = Math.min(nightHour, 23);

        const cloud = data.hourly.cloudcover[idx] || 0;
        const vis = (data.hourly.visibility[idx] || 0) / 1000;

        // Moon phase calculation
        const moonAge = ((now - new Date('2000-01-06')) / 86400000) % 29.53;
        const moonPct = Math.round(moonAge / 29.53 * 100);
        let moonPhase, moonIcon;
        if (moonAge < 1.85) { moonPhase = 'New Moon'; moonIcon = '🌑'; }
        else if (moonAge < 7.38) { moonPhase = 'Waxing Crescent'; moonIcon = '🌒'; }
        else if (moonAge < 9.22) { moonPhase = 'First Quarter'; moonIcon = '🌓'; }
        else if (moonAge < 14.77) { moonPhase = 'Waxing Gibbous'; moonIcon = '🌔'; }
        else if (moonAge < 16.61) { moonPhase = 'Full Moon'; moonIcon = '🌕'; }
        else if (moonAge < 22.15) { moonPhase = 'Waning Gibbous'; moonIcon = '🌖'; }
        else if (moonAge < 23.99) { moonPhase = 'Last Quarter'; moonIcon = '🌗'; }
        else { moonPhase = 'Waning Crescent'; moonIcon = '🌘'; }

        // Darkness — Threlkeld is Bortle 3-4
        const moonBrightness = moonAge > 7 && moonAge < 22 ? Math.round(Math.sin((moonAge / 29.53) * Math.PI) * 100) : 0;

        // Score 0-10
        let score = 10;
        score -= Math.round(cloud / 15);
        if (moonBrightness > 70) score -= 3;
        else if (moonBrightness > 40) score -= 1;
        if (vis < 10) score -= 1;
        score = Math.max(0, Math.min(10, score));

        let rating, ratingClass;
        if (score >= 8) { rating = 'Excellent'; ratingClass = 'excellent'; }
        else if (score >= 6) { rating = 'Good'; ratingClass = 'good'; }
        else if (score >= 4) { rating = 'Fair'; ratingClass = 'fair'; }
        else { rating = 'Poor'; ratingClass = 'poor'; }

        const sunsetTime = sunset.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        const sunrise = new Date(data.daily.sunrise[0]).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

        document.getElementById('stargazingCard').innerHTML = `
          <div class="stargazing-rating">
            <div class="stargazing-score">${score}/10</div>
            <div class="stargazing-label ${ratingClass}">${rating}</div>
          </div>
          <div class="stargazing-factors">
            <div class="stargazing-factor"><span class="stargazing-factor-label">Cloud cover</span><span class="stargazing-factor-value">${cloud}%</span></div>
            <div class="stargazing-factor"><span class="stargazing-factor-label">Moon phase</span><span class="stargazing-factor-value">${moonIcon} ${moonPhase}</span></div>
            <div class="stargazing-factor"><span class="stargazing-factor-label">Moon brightness</span><span class="stargazing-factor-value">${moonBrightness}%</span></div>
            <div class="stargazing-factor"><span class="stargazing-factor-label">Visibility</span><span class="stargazing-factor-value">${vis.toFixed(0)}km</span></div>
            <div class="stargazing-factor"><span class="stargazing-factor-label">Dark sky rating</span><span class="stargazing-factor-value">Bortle 3–4</span></div>
            <div class="stargazing-factor"><span class="stargazing-factor-label">Sunset / Sunrise</span><span class="stargazing-factor-value">${sunsetTime} / ${sunrise}</span></div>
          </div>`;
      } catch(e) {
        document.getElementById('stargazingCard').innerHTML = '<div style="color:var(--cream-dim);font-style:italic">Could not load stargazing data</div>';
      }
    }

    // ── Wind Rose ─────────────────────────────────────────────
    function renderWindRose(history) {
      const canvas = document.getElementById('windRoseCanvas');
      if (!canvas || !history || history.length === 0) return;
      const ctx = canvas.getContext('2d');
      const W = 240, cx = W/2, cy = W/2, r = 90;

      // Bucket wind directions into 16 sectors
      const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
      const counts = new Array(16).fill(0);
      let total = 0;

      history.forEach(d => {
        const deg = d.wind_direction?.mean;
        if (deg == null) return;
        const idx = Math.round(deg / 22.5) % 16;
        counts[idx]++;
        total++;
      });

      if (total === 0) return;

      ctx.clearRect(0, 0, W, W);

      // Background rings
      [0.25, 0.5, 0.75, 1].forEach(pct => {
        ctx.beginPath();
        ctx.arc(cx, cy, r * pct, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(122,184,122,0.1)';
        ctx.lineWidth = 1;
        ctx.stroke();
      });

      // Cardinal lines
      [0, 45, 90, 135].forEach(angle => {
        const rad = (angle - 90) * Math.PI / 180;
        ctx.beginPath();
        ctx.moveTo(cx - Math.cos(rad) * r, cy - Math.sin(rad) * r);
        ctx.lineTo(cx + Math.cos(rad) * r, cy + Math.sin(rad) * r);
        ctx.strokeStyle = 'rgba(122,184,122,0.1)';
        ctx.lineWidth = 1;
        ctx.stroke();
      });

      // Direction petals
      const maxCount = Math.max(...counts);
      counts.forEach((count, i) => {
        if (count === 0) return;
        const angle = (i * 22.5 - 90) * Math.PI / 180;
        const halfWidth = (11.25 * Math.PI / 180);
        const petal = (count / maxCount) * r;
        const alpha = 0.3 + (count / total) * 0.7;

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, petal, angle - halfWidth, angle + halfWidth);
        ctx.closePath();
        ctx.fillStyle = `rgba(74,144,164,${alpha})`;
        ctx.fill();
        ctx.strokeStyle = 'rgba(74,144,164,0.6)';
        ctx.lineWidth = 0.5;
        ctx.stroke();
      });

      // Cardinal labels
      const cardinals = [['N', 0], ['E', 90], ['S', 180], ['W', 270]];
      ctx.font = '11px Source Sans 3, sans-serif';
      ctx.fillStyle = 'rgba(184,200,180,0.8)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      cardinals.forEach(([label, deg]) => {
        const rad = (deg - 90) * Math.PI / 180;
        const lx = cx + Math.cos(rad) * (r + 14);
        const ly = cy + Math.sin(rad) * (r + 14);
        ctx.fillText(label, lx, ly);
      });

      // Centre dot
      ctx.beginPath();
      ctx.arc(cx, cy, 3, 0, Math.PI * 2);
      ctx.fillStyle = 'var(--sage)';
      ctx.fill();

      // Legend - top 3 directions
      const ranked = counts.map((c, i) => ({ dir: dirs[i], count: c, pct: Math.round(c/total*100) }))
        .sort((a, b) => b.count - a.count).slice(0, 5);
      document.getElementById('windRoseLegend').innerHTML =
        '<div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--sage);margin-bottom:8px">Prevailing</div>' +
        ranked.map(d => `<div><span style="color:var(--cream)">${d.dir}</span> — ${d.pct}%</div>`).join('');
    }

    // ── Bird/Weather Correlation ──────────────────────────────
    function renderCorrelation(history) {
      if (!history || history.length < 7) return;
      const el = document.getElementById('correlationGrid');
      if (!el) return;

      // We need bird data — use a simple heuristic from weather patterns
      // Rain correlation: rainy days vs dry days
      const rainyDays = history.filter(d => (d.rain?.sum || 0) > 2);
      const dryDays = history.filter(d => (d.rain?.sum || 0) <= 2);
      const avgRainyTemp = rainyDays.length ? rainyDays.reduce((s, d) => s + (d.outdoor_temperature?.mean || 0), 0) / rainyDays.length : 0;
      const avgDryTemp = dryDays.length ? dryDays.reduce((s, d) => s + (d.outdoor_temperature?.mean || 0), 0) / dryDays.length : 0;

      // Wind correlation
      const calmDays = history.filter(d => (d.wind_speed?.mean || 0) < 10);
      const windyDays = history.filter(d => (d.wind_speed?.mean || 0) >= 10);

      // Pressure trend
      const recentPressure = history.slice(0, 7).map(d => d.pressure?.mean || 0);
      const pressureTrend = recentPressure.length > 1
        ? recentPressure[0] - recentPressure[recentPressure.length-1]
        : 0;
      const pressureDir = pressureTrend > 2 ? '📈 Rising — improving' : pressureTrend < -2 ? '📉 Falling — deteriorating' : '➡️ Stable';

      // Best birding conditions estimate
      const bestDays = history.filter(d =>
        (d.rain?.sum || 0) < 1 &&
        (d.wind_speed?.mean || 0) < 15 &&
        (d.outdoor_temperature?.max || 0) > 8
      );

      el.innerHTML = `
        <div class="correlation-card">
          <div class="correlation-title">☀️ Dry vs Rainy Days</div>
          <div class="correlation-stat">${dryDays.length} / ${rainyDays.length}</div>
          <div class="correlation-desc">Dry days vs rainy days in the last ${history.length} days. Dry days average ${avgDryTemp.toFixed(1)}°C, rainy days ${avgRainyTemp.toFixed(1)}°C.</div>
        </div>
        <div class="correlation-card">
          <div class="correlation-title">💨 Calm vs Windy Days</div>
          <div class="correlation-stat">${calmDays.length} / ${windyDays.length}</div>
          <div class="correlation-desc">Calm days (under 10mph avg) vs windy. Dawn chorus detections are typically higher on calm mornings.</div>
        </div>
        <div class="correlation-card">
          <div class="correlation-title">🔵 Pressure Trend</div>
          <div class="correlation-stat">${Math.abs(pressureTrend).toFixed(1)} hPa</div>
          <div class="correlation-desc">${pressureDir} over the last 7 days. Rising pressure generally brings clearer skies and better birding conditions.</div>
        </div>
        <div class="correlation-card">
          <div class="correlation-title">🐦 Ideal Birding Days</div>
          <div class="correlation-stat">${bestDays.length} days</div>
          <div class="correlation-desc">Days with under 1mm rain, under 15mph wind, and above 8°C in the last ${history.length} days — optimal dawn chorus conditions.</div>
        </div>`;
    }

    const client = mqtt.connect(`wss://${MQTT_HOST}:${MQTT_PORT}/mqtt`);

    client.on('connect', () => {
      document.getElementById('statusDot').className = 'dot connected';
      document.getElementById('statusText').textContent = 'Live';
      client.subscribe(CURRENT_TOPIC);
      client.subscribe(HISTORY_TOPIC);
    });

    client.on('error', () => {
      document.getElementById('statusDot').className = 'dot error';
      document.getElementById('statusText').textContent = 'Connection error';
    });

    client.on('offline', () => {
      document.getElementById('statusDot').className = 'dot';
      document.getElementById('statusText').textContent = 'Offline';
    });

    client.on('message', (topic, message) => {
      try {
        const data = JSON.parse(message.toString());
        document.getElementById('lastUpdate').textContent = `Updated ${new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'})}`;
        if (topic === CURRENT_TOPIC) {
          currentData = data;
          renderStargazing(data);
          renderCurrent(data);
        } else if (topic === HISTORY_TOPIC) {
          historyData = data;
          if (currentData) renderMiniCharts();
          renderRecords(data);
          renderWindRose(data);
          renderCorrelation(data);
        }
      } catch(e) { console.error('Parse error:', e); }
    });
  </script>
</body>
</html>
